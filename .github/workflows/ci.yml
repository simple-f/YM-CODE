name: YM-CODE CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-async pytest-cov
        pip install langgraph langchain langchain-core
    
    - name: Run tests
      run: |
        pytest ymcode/workflow/test_core.py -v
    
    - name: Run benchmarks
      run: |
        python ymcode/workflow/test_benchmark.py
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install flake8
      run: pip install flake8
    
    - name: Lint with flake8
      run: |
        flake8 ymcode/workflow/langgraph_coordinator.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 ymcode/workflow/langgraph_coordinator.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
