<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM-CODE - Agent 选择</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .agent-card:hover {
            transform: translateY(-3px);
            border-color: #667eea;
        }
        .agent-card.selected {
            border-color: #4ade80;
            background: #1a4a7a;
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .agent-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        .agent-info h3 { font-size: 18px; margin-bottom: 5px; }
        .agent-model { font-size: 12px; color: #888; background: #0f3460; padding: 4px 8px; border-radius: 4px; }
        
        .agent-role {
            font-size: 13px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .agent-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .agent-capabilities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .capability-tag {
            font-size: 11px;
            background: #0f3460;
            color: #eee;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .selected-count {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary {
            background: #0f3460;
            color: #eee;
        }
        .btn-secondary:hover { background: #1a4a7a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 选择 Agent</h1>
        <p class="subtitle">点击卡片选择 Agent（可多选），然后开始对话</p>
        
        <div class="agent-grid" id="agentGrid"></div>
        
        <div class="actions">
            <button class="btn btn-primary" onclick="startMultiChat()">👥 多 Agent 协作</button>
            <button class="btn btn-primary" onclick="startSingleChat()">💬 单个对话</button>
            <button class="btn btn-secondary" onclick="selectAll()">全选</button>
            <button class="btn btn-secondary" onclick="clearSelection()">清空</button>
        </div>
    </div>
    
    <div class="selected-count" id="selectedCount">已选择 0 个 Agent</div>
    
    <script>
        const API_BASE = '';
        let allAgents = [];
        let selectedAgents = new Set();
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAgents();
        });
        
        // 加载 Agent 列表
        async function loadAgents() {
            try {
                const resp = await fetch(`${API_BASE}/api/team/list`);
                const data = await resp.json();
                allAgents = data.team?.agents || [];
                renderAgents();
            } catch (error) {
                console.error('加载 Agent 失败:', error);
                document.getElementById('agentGrid').innerHTML = '<p style="color: #f87171;">加载失败，请检查服务是否正常运行</p>';
            }
        }
        
        // 渲染 Agent 列表
        function renderAgents() {
            const grid = document.getElementById('agentGrid');
            if (allAgents.length === 0) {
                grid.innerHTML = '<p style="color: #888;">暂无 Agent，请检查 configs/team.json 配置</p>';
                return;
            }
            
            const avatars = {'ai1':'🎨','ai2':'💻','ai3':'🎨','ai4':'🔧','ai5':'✅','ai6':'💡','ai7':'📊'};
            const roleNames = {'system':'架构师','developer':'开发工程师','reviewer':'测试工程师','advisor':'顾问'};
            
            grid.innerHTML = allAgents.map(agent => `
                <div class="agent-card" onclick="toggleAgent('${agent.id}')" data-id="${agent.id}">
                    <div class="agent-header">
                        <div class="agent-avatar">${avatars[agent.id] || '🤖'}</div>
                        <div class="agent-info">
                            <h3>${agent.name}</h3>
                            <span class="agent-model">${agent.model}</span>
                        </div>
                    </div>
                    <div class="agent-role">${roleNames[agent.role] || agent.role}</div>
                    <div class="agent-desc">${agent.description || '暂无描述'}</div>
                    <div class="agent-capabilities">
                        ${(agent.capabilities || []).map(cap => `<span class="capability-tag">${cap}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // 切换 Agent 选择
        function toggleAgent(agentId) {
            if (selectedAgents.has(agentId)) {
                selectedAgents.delete(agentId);
                document.querySelector(`[data-id="${agentId}"]`)?.classList.remove('selected');
            } else {
                selectedAgents.add(agentId);
                document.querySelector(`[data-id="${agentId}"]`)?.classList.add('selected');
            }
            updateCount();
        }
        
        // 全选
        function selectAll() {
            allAgents.forEach(agent => {
                selectedAgents.add(agent.id);
                document.querySelector(`[data-id="${agent.id}"]`)?.classList.add('selected');
            });
            updateCount();
        }
        
        // 清空
        function clearSelection() {
            selectedAgents.clear();
            document.querySelectorAll('.agent-card').forEach(card => card.classList.remove('selected'));
            updateCount();
        }
        
        // 更新计数
        function updateCount() {
            document.getElementById('selectedCount').textContent = `已选择 ${selectedAgents.size} 个 Agent`;
        }
        
        // 开始单个对话
        function startSingleChat() {
            if (selectedAgents.size === 0) {
                alert('请至少选择一个 Agent');
                return;
            }
            
            if (selectedAgents.size > 1) {
                alert('单个对话只能选择一个 Agent，请选择一个或使用"多 Agent 协作"');
                return;
            }
            
            const agentId = [...selectedAgents][0];
            window.location.href = `/web/chat-agent.html?agent=${agentId}`;
        }
        
        // 开始多 Agent 协作
        function startMultiChat() {
            if (selectedAgents.size === 0) {
                alert('请至少选择一个 Agent');
                return;
            }
            
            // 保存到 localStorage
            localStorage.setItem('selectedAgents', JSON.stringify([...selectedAgents]));
            
            // 跳转到多 Agent 页面
            window.location.href = `/web/multi-agent.html?agents=${[...selectedAgents].join(',')}`;
        }
    </script>
</body>
</html>
