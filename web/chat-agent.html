<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM-CODE - 与 Agent 对话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message.agent {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
        }
        .message-header {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        .input-container {
            padding: 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }
        #messageInput {
            flex: 1;
            padding: 15px 20px;
            background: #0f3460;
            border: 2px solid #1a4a7a;
            border-radius: 12px;
            color: #eee;
            font-size: 15px;
        }
        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }
        #sendBtn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        #sendBtn:hover { opacity: 0.9; }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h2 style="font-size: 20px;">💬 与 Agent 对话</h2>
            <p id="agentInfo" style="font-size: 13px; color: #888; margin-top: 5px;">加载中...</p>
        </div>
        <button onclick="location.href='/web/agents.html'" style="padding: 10px 20px; background: #0f3460; border: none; border-radius: 8px; color: #eee; cursor: pointer;">
            ← 返回选择
        </button>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div style="text-align: center; padding: 60px; color: #888;">
            <h3 style="font-size: 24px; margin-bottom: 15px;">👋 开始对话</h3>
            <p>在下方输入你的问题，Agent 会为你解答</p>
        </div>
    </div>
    
    <div class="input-container">
        <form class="input-wrapper" id="chatForm">
            <input type="text" id="messageInput" placeholder="输入你的问题..." autocomplete="off" />
            <button type="submit" id="sendBtn">发送</button>
        </form>
    </div>
    
    <script>
        const API_BASE = '';
        let chatHistory = [];
        let currentAgent = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 从 URL 参数获取 Agent ID
            const params = new URLSearchParams(window.location.search);
            const agentId = params.get('agent');
            
            if (!agentId) {
                // 没有指定 Agent，跳转到选择页面
                window.location.href = '/web/agents.html';
                return;
            }
            
            // 加载 Agent 信息
            await loadAgent(agentId);
            initForm();
        });
        
        // 加载 Agent 信息
        async function loadAgent(agentId) {
            try {
                const resp = await fetch(`${API_BASE}/api/team/list`);
                const data = await resp.json();
                const agent = data.team?.agents?.find(a => a.id === agentId);
                
                if (!agent) {
                    document.getElementById('agentInfo').textContent = 'Agent 不存在';
                    return;
                }
                
                currentAgent = agent;
                document.getElementById('agentInfo').textContent = `${agent.name} · ${agent.model}`;
                document.title = `与 ${agent.name} 对话`;
            } catch (error) {
                console.error('加载 Agent 失败:', error);
            }
        }
        
        // 初始化表单
        function initForm() {
            const form = document.getElementById('chatForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                await sendMessage();
            });
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 清空欢迎消息
            const container = document.getElementById('chatContainer');
            if (container.querySelector('h3')) {
                container.innerHTML = '';
            }
            
            // 添加用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 禁用发送按钮
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.textContent = '发送中...';
            
            try {
                // 调用聊天 API
                const resp = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        agent_id: currentAgent?.id
                    })
                });
                
                const data = await resp.json();
                addMessage(data.response || '处理完成', 'agent');
            } catch (error) {
                addMessage(`错误：${error.message}`, 'agent');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
                input.focus();
            }
        }
        
        // 添加消息
        function addMessage(content, type) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            if (type === 'agent') {
                messageDiv.innerHTML = `
                    <div class="message-header">${currentAgent?.name || 'Agent'}</div>
                    <div>${formatMessage(content)}</div>
                `;
            } else {
                messageDiv.innerHTML = `<div>${escapeHtml(content)}</div>`;
            }
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        // 格式化消息
        function formatMessage(text) {
            return escapeHtml(text)
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
