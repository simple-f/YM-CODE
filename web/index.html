<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM-CODE - AI 编程助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; height: 100vh; }
        
        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            text-align: center;
        }
        .sidebar-header h1 { font-size: 20px; margin-bottom: 5px; }
        .sidebar-header p { font-size: 12px; opacity: 0.8; }
        
        .nav-menu { flex: 1; padding: 10px; }
        .nav-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }
        .nav-item:hover { background: #0f3460; }
        .nav-item.active { background: #667eea; }
        .nav-item .icon { font-size: 18px; }
        
        /* 主内容区 */
        .main { flex: 1; display: flex; flex-direction: column; }
        
        /* 顶部栏 */
        .topbar {
            height: 60px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }
        .workspace-select {
            padding: 8px 15px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 6px;
            color: #eee;
            font-size: 13px;
        }
        
        /* 内容面板 */
        .content-panel {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .panel {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .panel.active { display: block; }
        
        /* 聊天面板 */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: #667eea;
        }
        .message.assistant {
            align-self: flex-start;
            background: #0f3460;
        }
        .chat-input {
            padding: 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 8px;
            color: #eee;
            font-size: 14px;
        }
        .chat-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .chat-input button {
            padding: 12px 24px;
            background: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .chat-input button:hover { background: #5568d3; }
        
        /* 文件浏览器面板 */
        .file-browser {
            display: flex;
            gap: 20px;
            height: 100%;
        }
        .file-tree {
            width: 300px;
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
        }
        .file-tree-header {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-tree-header button {
            padding: 4px 8px;
            background: #667eea;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        .file-item {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .file-item:hover { background: #0f3460; }
        .file-item.folder { color: #ffd700; }
        .file-item.file { color: #eee; }
        .file-item .icon { font-size: 16px; }
        .file-preview {
            flex: 1;
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            overflow: auto;
        }
        .file-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #0f3460;
        }
        .file-preview-content {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            background: #0f3460;
            padding: 15px;
            border-radius: 6px;
            overflow: auto;
            max-height: calc(100vh - 200px);
        }
        
        /* 终端面板 */
        .terminal-container {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 15px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .terminal-output {
            flex: 1;
            background: #0a0a0a;
            border-radius: 4px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #00ff00;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }
        .terminal-input-line {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .terminal-prompt {
            color: #00ff00;
            font-weight: bold;
        }
        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #eee;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 8px;
        }
        .terminal-input:focus { outline: none; }
        .terminal-actions {
            display: flex;
            gap: 10px;
        }
        .terminal-actions button {
            padding: 6px 12px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: #eee;
            font-size: 12px;
            cursor: pointer;
        }
        .terminal-actions button:hover { background: #444; }
        .terminal-actions button.danger { background: #dc3545; }
        .terminal-actions button.danger:hover { background: #c82333; }
        
        /* 任务面板 */
        .task-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            height: 100%;
        }
        .task-column {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
        }
        .task-column-header {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0f3460;
        }
        .task-column.inbox .task-column-header { border-color: #667eea; }
        .task-column.spec .task-column-header { border-color: #ffd700; }
        .task-column.build .task-column-header { border-color: #00ff00; }
        .task-column.review .task-column-header { border-color: #ff6b6b; }
        .task-column.done .task-column-header { border-color: #28a745; }
        .task-card {
            background: #0f3460;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .task-card:hover { background: #1a4a7a; }
        .task-card-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .task-card-meta {
            font-size: 11px;
            color: #888;
            display: flex;
            justify-content: space-between;
        }
        
        /* 技能市场面板 */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .skill-card {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #0f3460;
        }
        .skill-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .skill-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .skill-name {
            font-size: 16px;
            font-weight: bold;
        }
        .skill-desc {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .skill-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
        }
        .skill-actions {
            display: flex;
            gap: 10px;
        }
        .skill-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-install {
            background: #667eea;
            color: white;
        }
        .btn-installed {
            background: #28a745;
            color: white;
            cursor: not-allowed;
        }
        .btn-uninstall {
            background: #dc3545;
            color: white;
        }
        
        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #667eea; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5568d3; }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 YM-CODE</h1>
                <p>AI 编程助手 v0.3.5</p>
            </div>
            <div class="nav-menu">
                <div class="nav-item active" data-panel="chat">
                    <span class="icon">💬</span>
                    <span>聊天</span>
                </div>
                <div class="nav-item" data-panel="files">
                    <span class="icon">📁</span>
                    <span>文件浏览器</span>
                </div>
                <div class="nav-item" data-panel="terminal">
                    <span class="icon">⌨️</span>
                    <span>Web 终端</span>
                </div>
                <div class="nav-item" data-panel="tasks">
                    <span class="icon">📋</span>
                    <span>任务管理</span>
                </div>
                <div class="nav-item" data-panel="skills">
                    <span class="icon">🛠️</span>
                    <span>技能市场</span>
                </div>
            </div>
            <div class="sessions-panel">
                <div class="sessions-title">最近会话</div>
                <div id="sessionsList"></div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main">
            <div class="topbar">
                <select class="workspace-select" id="workspaceSelect">
                    <option value="default">默认工作空间</option>
                </select>
                <div class="status-indicator">
                    <span style="color: #00ff00;">●</span>
                    <span style="font-size: 12px; margin-left: 5px;">在线</span>
                </div>
            </div>
            
            <div class="content-panel">
                <!-- 聊天面板 -->
                <div class="panel active" id="chatPanel">
                    <div class="chat-container">
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input">
                            <input type="text" id="chatInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()">发送</button>
                        </div>
                    </div>
                </div>
                
                <!-- 文件浏览器面板 -->
                <div class="panel" id="filesPanel">
                    <div class="file-browser">
                        <div class="file-tree">
                            <div class="file-tree-header">
                                <span>📁 文件树</span>
                                <button onclick="refreshFiles()">🔄</button>
                            </div>
                            <div id="fileTreeContent"></div>
                        </div>
                        <div class="file-preview">
                            <div class="file-preview-header">
                                <span id="fileName">选择文件预览</span>
                                <div class="terminal-actions">
                                    <button onclick="downloadFile()">⬇️ 下载</button>
                                    <button onclick="deleteFile()" class="danger">🗑️ 删除</button>
                                </div>
                            </div>
                            <div class="file-preview-content" id="fileContent"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Web 终端面板 -->
                <div class="panel" id="terminalPanel">
                    <div class="terminal-container">
                        <div class="terminal-header">
                            <span>⌨️ Web 终端 - PowerShell</span>
                            <div class="terminal-actions">
                                <button onclick="clearTerminal()">🧹 清屏</button>
                                <button onclick="newTerminal()">➕ 新建</button>
                            </div>
                        </div>
                        <div class="terminal-output" id="terminalOutput"></div>
                        <div class="terminal-input-line">
                            <span class="terminal-prompt">PS&gt;</span>
                            <input type="text" class="terminal-input" id="terminalInput" 
                                   placeholder="输入命令..." onkeypress="if(event.key==='Enter') executeCommand()">
                        </div>
                    </div>
                </div>
                
                <!-- 任务管理面板 -->
                <div class="panel" id="tasksPanel">
                    <div class="task-board">
                        <div class="task-column inbox">
                            <div class="task-column-header">📥 收件箱</div>
                            <div id="tasksInbox"></div>
                        </div>
                        <div class="task-column spec">
                            <div class="task-column-header">📝 规格</div>
                            <div id="tasksSpec"></div>
                        </div>
                        <div class="task-column build">
                            <div class="task-column-header">🔨 构建</div>
                            <div id="tasksBuild"></div>
                        </div>
                        <div class="task-column review">
                            <div class="task-column-header">👀 审查</div>
                            <div id="tasksReview"></div>
                        </div>
                        <div class="task-column done">
                            <div class="task-column-header">✅ 完成</div>
                            <div id="tasksDone"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 技能市场面板 -->
                <div class="panel" id="skillsPanel">
                    <div class="skills-grid" id="skillsGrid"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // API 基础 URL
        const API_BASE = 'http://localhost:18770/api';
        
        // 当前状态
        let currentSession = null;
        let currentFile = null;
        let terminalSessionId = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initNavigation();
            loadSessions();
            loadTasks();
            loadSkills();
            addMessage('assistant', '你好！我是 YM-CODE，你的 AI 编程助手。有什么可以帮你的吗？');
        });
        
        // 导航切换
        function initNavigation() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    // 更新导航状态
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    
                    // 切换面板
                    const panelId = item.dataset.panel;
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    document.getElementById(panelId + 'Panel').classList.add('active');
                    
                    // 加载对应数据
                    if (panelId === 'files') loadFiles();
                    if (panelId === 'terminal') initTerminal();
                });
            });
        }
        
        // ========== 聊天功能 ==========
        function addMessage(role, content) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.textContent = content;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            input.value = '';
            
            // 显示加载动画
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            document.getElementById('chatMessages').appendChild(loadingDiv);
            
            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: currentSession
                    })
                });
                
                const data = await response.json();
                loadingDiv.remove();
                addMessage('assistant', data.response || '处理完成');
                
                if (data.session_id) {
                    currentSession = data.session_id;
                    loadSessions();
                }
            } catch (error) {
                loadingDiv.remove();
                addMessage('assistant', '错误：' + error.message);
            }
        }
        
        // ========== 文件浏览器功能 ==========
        async function loadFiles(path = '') {
            try {
                const response = await fetch(`${API_BASE}/files/list?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                renderFileTree(data.files || [], path);
            } catch (error) {
                console.error('加载文件失败:', error);
            }
        }
        
        function refreshFiles() {
            loadFiles();
        }
        
        function renderFileTree(files, basePath) {
            const container = document.getElementById('fileTreeContent');
            container.innerHTML = '';
            
            // 返回上级目录
            if (basePath) {
                const parentDiv = document.createElement('div');
                parentDiv.className = 'file-item folder';
                parentDiv.innerHTML = '<span class="icon">📁</span><span>..</span>';
                parentDiv.onclick = () => loadFiles(getParentPath(basePath));
                container.appendChild(parentDiv);
            }
            
            // 先显示文件夹
            files.filter(f => f.type === 'folder').forEach(folder => {
                const div = document.createElement('div');
                div.className = 'file-item folder';
                div.innerHTML = `<span class="icon">📁</span><span>${folder.name}</span>`;
                div.onclick = () => loadFiles(joinPath(basePath, folder.name));
                container.appendChild(div);
            });
            
            // 再显示文件
            files.filter(f => f.type === 'file').forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item file';
                div.innerHTML = `<span class="icon">📄</span><span>${file.name}</span>`;
                div.onclick = () => previewFile(joinPath(basePath, file.name));
                container.appendChild(div);
            });
        }
        
        function getParentPath(path) {
            const parts = path.split(/[\\/]/);
            return parts.slice(0, -1).join('/');
        }
        
        function joinPath(base, name) {
            return base ? `${base}/${name}` : name;
        }
        
        async function previewFile(filePath) {
            currentFile = filePath;
            document.getElementById('fileName').textContent = filePath;
            
            try {
                const response = await fetch(`${API_BASE}/files/read?path=${encodeURIComponent(filePath)}`);
                const data = await response.json();
                document.getElementById('fileContent').textContent = data.content || '';
            } catch (error) {
                document.getElementById('fileContent').textContent = '错误：' + error.message;
            }
        }
        
        async function downloadFile() {
            if (!currentFile) return alert('请先选择文件');
            window.open(`${API_BASE}/files/read?path=${encodeURIComponent(currentFile)}&download=1`, '_blank');
        }
        
        async function deleteFile() {
            if (!currentFile) return alert('请先选择文件');
            if (!confirm(`确定要删除 ${currentFile} 吗？`)) return;
            
            try {
                await fetch(`${API_BASE}/files/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentFile })
                });
                alert('删除成功');
                loadFiles();
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }
        
        // ========== Web 终端功能 ==========
        function initTerminal() {
            if (!terminalSessionId) {
                terminalSessionId = 'term_' + Date.now();
            }
            document.getElementById('terminalInput').focus();
        }
        
        async function executeCommand() {
            const input = document.getElementById('terminalInput');
            const command = input.value.trim();
            if (!command) return;
            
            const output = document.getElementById('terminalOutput');
            output.textContent += `PS> ${command}\n`;
            
            try {
                const response = await fetch(`${API_BASE}/terminal/execute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        command: command,
                        session_id: terminalSessionId
                    })
                });
                
                const data = await response.json();
                output.textContent += (data.output || data.stdout || '') + '\n';
                if (data.stderr) output.textContent += `错误：${data.stderr}\n`;
            } catch (error) {
                output.textContent += `错误：${error.message}\n`;
            }
            
            input.value = '';
            output.scrollTop = output.scrollHeight;
        }
        
        function clearTerminal() {
            document.getElementById('terminalOutput').textContent = '';
        }
        
        function newTerminal() {
            terminalSessionId = 'term_' + Date.now();
            clearTerminal();
            document.getElementById('terminalOutput').textContent = '新终端会话已创建\n\n';
        }
        
        // ========== 任务管理功能 ==========
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks/list`);
                const data = await response.json();
                renderTasks(data.tasks || []);
            } catch (error) {
                console.error('加载任务失败:', error);
            }
        }
        
        function renderTasks(tasks) {
            // 清空所有列
            ['Inbox', 'Spec', 'Build', 'Review', 'Done'].forEach(status => {
                document.getElementById(`tasks${status}`).innerHTML = '';
            });
            
            // 渲染任务
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div class="task-card-title">${task.title}</div>
                    <div class="task-card-meta">
                        <span>${task.priority || '普通'}</span>
                        <span>${new Date(task.created_at).toLocaleDateString()}</span>
                    </div>
                `;
                
                const column = document.getElementById(`tasks${task.status || 'Inbox'}`);
                if (column) column.appendChild(card);
            });
        }
        
        // ========== 技能市场功能 ==========
        async function loadSkills() {
            try {
                const response = await fetch(`${API_BASE}/skills/list`);
                const data = await response.json();
                renderSkills(data.skills || []);
            } catch (error) {
                console.error('加载技能失败:', error);
            }
        }
        
        function renderSkills(skills) {
            const container = document.getElementById('skillsGrid');
            container.innerHTML = '';
            
            skills.forEach(skill => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.innerHTML = `
                    <div class="skill-card-header">
                        <div class="skill-icon">🛠️</div>
                        <div class="skill-name">${skill.name}</div>
                    </div>
                    <div class="skill-desc">${skill.description || '暂无描述'}</div>
                    <div class="skill-meta">
                        <span>版本：${skill.version || '1.0.0'}</span>
                        <span>作者：${skill.author || '官方'}</span>
                    </div>
                    <div class="skill-actions">
                        <button class="btn-install" onclick="installSkill('${skill.name}')">安装</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        async function installSkill(skillName) {
            alert(`安装技能：${skillName}\n（功能开发中）`);
        }
        
        // ========== Session 管理 ==========
        async function loadSessions() {
            // TODO: 实现 session 列表加载
        }
    </script>
</body>
</html>
