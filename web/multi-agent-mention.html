<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM-CODE - 多 Agent 协作对话（@mention 版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            height: 100vh;
            overflow: hidden;
        }
        .container { display: flex; height: 100vh; }
        
        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h2 { font-size: 18px; margin-bottom: 15px; color: #58a6ff; }
        
        .agent-card {
            background: #21262d;
            border: 2px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .agent-card:hover { background: #30363d; }
        .agent-card.active { border-color: #58a6ff; background: #1f6feb33; }
        .agent-card.speaking { border-color: #f0883e; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(240, 136, 62, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(240, 136, 62, 0); }
        }
        
        .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .agent-name { font-weight: 600; font-size: 14px; }
        .agent-model { font-size: 11px; color: #8b949e; }
        .agent-desc { font-size: 12px; color: #8b949e; }
        
        /* 主聊天区 */
        .main { flex: 1; display: flex; flex-direction: column; }
        
        .chat-header {
            padding: 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-title h2 { font-size: 18px; margin-bottom: 5px; }
        .chat-title p { font-size: 13px; color: #8b949e; }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #21262d;
            border-radius: 20px;
            font-size: 13px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }
        .status-dot.thinking { background: #f0883e; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .controls {
            padding: 15px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .control-group label { font-size: 13px; color: #8b949e; }
        
        input[type="range"] {
            width: 150px;
            accent-color: #58a6ff;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary { background: #1f6feb; color: white; }
        .btn-primary:hover { background: #388bfd; }
        .btn-danger { background: #da3633; color: white; }
        .btn-danger:hover { background: #f85149; }
        
        /* 聊天容器 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        
        .message {
            margin-bottom: 25px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
        }
        
        .message.agent .message-content {
            background: #21262d;
            border: 1px solid #30363d;
        }
        
        .message.user .message-content {
            background: #1f6feb;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .agent-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #58a6ff, #8b949e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .agent-info { flex: 1; }
        .agent-name-display { font-weight: 600; }
        .message-meta { font-size: 11px; color: #8b949e; }
        
        .mention {
            display: inline-block;
            padding: 2px 6px;
            background: #1f6feb33;
            color: #58a6ff;
            border-radius: 4px;
            font-weight: 500;
            font-size: 12px;
        }
        
        .round-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #8b949e33;
            border-radius: 10px;
            font-size: 11px;
            color: #8b949e;
            margin-left: 8px;
        }
        
        /* 输入区 */
        .input-container {
            padding: 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e7e9ea;
            font-size: 14px;
            outline: none;
        }
        #messageInput:focus { border-color: #58a6ff; }
        
        #sendBtn {
            padding: 12px 24px;
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 欢迎消息 */
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        .welcome h3 { font-size: 24px; margin-bottom: 15px; color: #e7e9ea; }
        .welcome p { margin: 10px 0; }
        
        /* 统计信息 */
        .summary {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .summary h4 { font-size: 14px; margin-bottom: 10px; color: #58a6ff; }
        .summary-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat { text-align: center; }
        .stat-value { font-size: 24px; font-weight: 700; color: #3fb950; }
        .stat-label { font-size: 12px; color: #8b949e; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 - Agent 列表 -->
        <aside class="sidebar">
            <h2>👥 Agent 团队</h2>
            <div id="agentList"></div>
        </aside>
        
        <!-- 主聊天区 -->
        <main class="main">
            <div class="chat-header">
                <div class="chat-title">
                    <h2>💬 多 Agent 协作对话</h2>
                    <p>使用 @mention 触发 Agent 响应，支持多轮对话</p>
                </div>
                <div class="status-badge">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">就绪</span>
                </div>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>对话轮数:</label>
                    <input type="range" id="roundsSlider" min="1" max="15" value="15" 
                           oninput="document.getElementById('roundsValue').textContent = this.value" />
                    <span id="roundsValue" style="color: #e7e9ea; font-weight: 600;">15</span>
                    <span style="color: #8b949e; font-size: 12px;">轮 (P0 深度限制)</span>
                </div>
                <button class="btn btn-danger" onclick="clearChat()">🗑️ 清空对话</button>
            </div>
            
            <div class="chat-container" id="chatContainer">
                <div class="welcome">
                    <h3>👋 欢迎使用多 Agent 协作</h3>
                    <p>1. 左侧选择参与对话的 Agent（可多选）</p>
                    <p>2. 在下方输入你的问题，使用 @agent名称 触发响应</p>
                    <p>3. Agent 们会自动协作讨论并解决问题！</p>
                    <p style="margin-top: 15px; font-size: 13px; color: #58a6ff;">示例：@架构师 和 @后端开发 设计一个登录系统</p>
                </div>
            </div>
            
            <div class="input-container">
                <form class="input-wrapper" id="chatForm">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="输入问题，例如：@架构师 和 @后端开发 设计登录系统" 
                        autocomplete="off"
                    />
                    <button type="submit" id="sendBtn">发送</button>
                </form>
            </div>
        </main>
    </div>
    
    <script>
        const API_BASE = '/api';
        let selectedAgents = new Set();
        let allAgents = [];
        let isProcessing = false;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
        });
        
        // 加载 Agent 列表
        async function loadAgents() {
            try {
                const resp = await fetch(`${API_BASE}/workspace/ws_default`);
                const data = await resp.json();
                allAgents = data.agents;
                
                const agentList = document.getElementById('agentList');
                const avatars = ['👨‍💻', '👩‍🔬', '🧙‍♂️', '🤖', '🦊', '🦉', '🐱', '🐶'];
                
                agentList.innerHTML = allAgents.map((agent, index) => `
                    <div class="agent-card" onclick="toggleAgent('${agent.id}')" data-id="${agent.id}">
                        <div class="agent-header">
                            <span class="agent-avatar">${avatars[index % avatars.length]}</span>
                            <div style="flex: 1; margin-left: 10px;">
                                <div class="agent-header">
                                    <span class="agent-name">${escapeHtml(agent.name)}</span>
                                    <span style="background: #3fb95033; color: #3fb950; padding: 2px 6px; border-radius: 4px; font-size: 10px;">✓</span>
                                </div>
                                <div class="agent-model">${agent.model}</div>
                                <div class="agent-desc">${agent.description || ''}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                // 默认选择前 3 个
                allAgents.slice(0, 3).forEach(agent => selectedAgents.add(agent.id));
                updateAgentSelection();
                
            } catch (error) {
                console.error('加载 Agent 失败:', error);
            }
        }
        
        function toggleAgent(agentId) {
            if (selectedAgents.has(agentId)) {
                if (selectedAgents.size > 1) {
                    selectedAgents.delete(agentId);
                } else {
                    alert('至少需要一个 Agent 参与对话');
                    return;
                }
            } else {
                selectedAgents.add(agentId);
            }
            updateAgentSelection();
        }
        
        function updateAgentSelection() {
            document.querySelectorAll('.agent-card').forEach(card => {
                const agentId = card.dataset.id;
                card.classList.toggle('active', selectedAgents.has(agentId));
            });
        }
        
        function highlightAgent(agentId) {
            document.querySelectorAll('.agent-card').forEach(card => {
                card.classList.toggle('speaking', card.dataset.id === agentId);
            });
        }
        
        function clearAgentHighlight() {
            document.querySelectorAll('.agent-card').forEach(card => {
                card.classList.remove('speaking');
            });
        }
        
        // 聊天功能
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isProcessing) return;
            if (selectedAgents.size === 0) {
                alert('请至少选择一个 Agent');
                return;
            }
            
            input.value = '';
            await startMultiAgentChat(message);
        });
        
        async function startMultiAgentChat(question) {
            isProcessing = true;
            updateStatus('streaming', '直播中...');
            
            // 添加用户消息
            addMessage(question, 'user');
            
            const rounds = parseInt(document.getElementById('roundsSlider').value);
            
            // 获取选中的 Agent
            const participatingAgents = allAgents.filter(a => selectedAgents.has(a.id));
            
            try {
                const agentIds = participatingAgents.map(a => a.id);
                const agentMentions = agentIds.map(id => `@${id}`).join(' 和 ');
                const messageWithMentions = `${agentMentions} ${question}`;
                
                // 使用流式 API - 每个 Agent 回复立即显示
                const response = await fetch(`${API_BASE}/multi-agent/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: messageWithMentions,
                        rounds: rounds
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || `HTTP ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                // 清空欢迎消息
                const container = document.getElementById('chatContainer');
                if (container.querySelector('.welcome')) {
                    container.innerHTML = '';
                }
                
                const avatars = ['👨‍💻', '👩‍🔬', '🧙‍♂️', '🤖', '🦊', '🦉', '🐱', '🐶'];
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            
                            // Agent 回复 - 立即显示！
                            if (data.agent && data.message) {
                                const agent = participatingAgents.find(a => a.id === data.agent_id);
                                const avatarIndex = allAgents.findIndex(a => a.id === data.agent_id);
                                addMessageWithMentions(data, agent, avatars[avatarIndex % avatars.length]);
                                highlightAgent(data.agent_id);
                            }
                            
                            // 对话完成
                            if (data.total_messages !== undefined) {
                                updateStatus('ready', '对话完成');
                                addSummary(data);
                            }
                            
                            // 错误处理
                            if (data.error) {
                                addMessage(`错误：${data.error}`, 'error');
                                updateStatus('ready', '出错');
                            }
                        }
                    }
                }
                
            } catch (error) {
                console.error('多 Agent 对话失败:', error);
                addMessage(`错误：${error.message}`, 'error');
                updateStatus('ready', '出错');
            } finally {
                isProcessing = false;
                clearAgentHighlight();
            }
        }
        
        function addRoundIndicator(round, totalRounds) {
            const container = document.getElementById('chatContainer');
            const indicator = document.createElement('div');
            indicator.style.cssText = 'text-align: center; padding: 10px; color: #8b949e; font-size: 13px; margin: 10px 0;';
            indicator.innerHTML = `────────── 第 ${round}/${totalRounds} 轮 ──────────`;
            container.appendChild(indicator);
            container.scrollTop = container.scrollHeight;
        }
        
        function addMessageWithMentions(msg, agent, avatar = '🤖') {
            const container = document.getElementById('chatContainer');
            
            // 清空欢迎消息
            if (container.querySelector('.welcome')) {
                container.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message agent';
            
            // 处理@mention 高亮
            let formattedMessage = escapeHtml(msg.message);
            if (msg.mentions && msg.mentions.length > 0) {
                msg.mentions.forEach(m => {
                    const regex = new RegExp(`@${escapeRegex(m.agent_name)}|@${escapeRegex(m.agent_id)}`, 'g');
                    formattedMessage = formattedMessage.replace(regex, `<span class="mention">${m.mention_text}</span>`);
                });
            }
            
            // 换行处理
            formattedMessage = formattedMessage.replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="agent-avatar">${avatar}</span>
                    <div class="agent-info">
                        <span class="agent-name-display">${escapeHtml(agent.name)}</span>
                        <span class="round-badge">第${msg.round}轮</span>
                    </div>
                    <span class="message-meta">${msg.model}</span>
                </div>
                <div class="message-content">${formattedMessage}</div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            // 高亮当前 Agent
            highlightAgent(agent.id);
        }
        
        function addSummary(result) {
            const container = document.getElementById('chatContainer');
            
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'summary';
            summaryDiv.innerHTML = `
                <h4>📊 对话统计</h4>
                <div class="summary-stats">
                    <div class="stat">
                        <div class="stat-value">${result.total_messages}</div>
                        <div class="stat-label">总消息数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${result.rounds}</div>
                        <div class="stat-label">对话轮数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${result.agents.length}</div>
                        <div class="stat-label">参与 Agent</div>
                    </div>
                </div>
                <div style="margin-top: 15px; font-size: 12px; color: #8b949e;">
                    <strong>模式:</strong> ${result.mode === 'mention' ? '@mention 触发' : '手动指定'}
                </div>
            `;
            
            container.appendChild(summaryDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function addMessage(content, type) {
            const container = document.getElementById('chatContainer');
            
            if (container.querySelector('.welcome')) {
                container.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            if (type === 'user') {
                messageDiv.innerHTML = `
                    <div class="message-content">${escapeHtml(content)}</div>
                `;
            } else {
                messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            }
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function clearChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <div class="welcome">
                    <h3>👋 欢迎使用多 Agent 协作</h3>
                    <p>1. 左侧选择参与对话的 Agent（可多选）</p>
                    <p>2. 在下方输入你的问题，使用 @agent 名称 触发响应</p>
                    <p>3. Agent 们会自动协作讨论并解决问题！</p>
                    <p style="margin-top: 15px; font-size: 13px; color: #58a6ff;">示例：@架构师 和 @后端开发 设计一个登录系统</p>
                </div>
            `;
        }
        
        function updateStatus(status, text) {
            const dot = document.getElementById('statusDot');
            const textEl = document.getElementById('statusText');
            
            if (status === 'thinking') {
                dot.classList.add('thinking');
            } else {
                dot.classList.remove('thinking');
            }
            
            textEl.textContent = text;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function escapeRegex(text) {
            return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
