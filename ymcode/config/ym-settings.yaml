# YM-CODE 配置文件
# 你的编程伙伴，你的思维延伸

# ====================
# 基础配置
# ====================

app:
  name: "YM-CODE"
  version: "0.1.0"
  codename: "Aurora"  # 极光 - 第一版代号
  
# 用户配置
user:
  # 你的称呼（可选）
  nickname: ""
  # 时区
  timezone: "Asia/Shanghai"
  # 语言
  language: "zh-CN"

# ====================
# AI 配置
# ====================

ai:
  # 默认模型
  default_model: "qwen3.5-plus"
  # 备选模型
  fallback_models:
    - "qwen3-plus"
    - "qwen2.5-plus"
  # 最大 tokens
  max_tokens: 4000
  # 超时（秒）
  timeout: 30
  # API 端点
  api_endpoint: "http://localhost:8080"
  # API Key（可选，从环境变量读取）
  api_key: "${YM_CODE_API_KEY}"

# ====================
# 技能配置
# ====================

skills:
  # 启用的技能列表
  enabled:
    - search
    - http
    - shell
    - code_analysis
    - database
    - formatter
    - docker
    - memory
    - self_improvement
  
  # 技能目录
  directories:
    - "~/.ym-code/skills"
    - "./skills"
  
  # 自动加载新技能
  auto_load: true

# ====================
# MCP 配置
# ====================

mcp:
  # 启用 MCP
  enabled: true
  
  # MCP 服务器列表
  servers:
    - name: "filesystem"
      type: "stdio"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-filesystem"]
      enabled: true
    
    - name: "git"
      type: "stdio"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-git"]
      enabled: true
    
    - name: "github"
      type: "stdio"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-github"]
      enabled: true

# ====================
# 记忆配置
# ====================

memory:
  # 启用长期记忆
  enabled: true
  
  # 会话保留天数
  session_retention_days: 30
  
  # 记忆存储位置
  storage: "~/.ym-code/memory"
  
  # 自动压缩上下文
  auto_compress: true
  
  # 压缩阈值（token 数）
  compress_threshold: 3500

# ====================
# 界面配置
# ====================

ui:
  # 主题：auto, light, dark
  theme: "auto"
  
  # 颜色方案
  colors:
    primary: "#8B5CF6"    # 极光紫
    secondary: "#3B82F6"  # 电光蓝
    background: "#0F172A" # 深空黑
  
  # 显示进度条
  show_progress: true
  
  # 显示代码高亮
  syntax_highlight: true

# ====================
# 高级配置
# ====================

advanced:
  # 调试模式
  debug: false
  
  # 日志级别：DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # 自动更新检查
  auto_update: true
  
  # 指标收集
  metrics:
    enabled: true
    retention_days: 30
  
  # 性能优化
  performance:
    # 启用缓存
    cache: true
    # 缓存大小（MB）
    cache_size: 512
    # 并发请求数
    concurrency: 5

# ====================
# 快捷键配置
# ====================

keybindings:
  # 打开面板
  show_panel: "Ctrl+Shift+M"
  # 快速提问
  quick_ask: "Ctrl+Shift+Y"
  # 清空历史
  clear_history: "Ctrl+Shift+X"
  # 取消操作
  cancel: "Escape"

# ====================
# 隐私与安全
# ====================

privacy:
  # 匿名使用统计
  anonymous_usage: true
  
  # 错误报告
  error_reporting: true
  
  # 不收集的数据
  do_not_collect:
    - 源代码内容
    - API 密钥
    - 个人文件路径
    - 数据库凭证

# ====================
# 扩展配置
# ====================

extensions:
  # 启用扩展系统
  enabled: true
  
  # 扩展目录
  directory: "~/.ym-code/extensions"
  
  # 自动安装依赖
  auto_install_deps: true

# ====================
# 工作空间配置
# ====================

workspace:
  # 项目配置目录
  project_config: ".project"
  
  # 上下文索引
  context_index: true
  
  # 自动保存历史
  auto_save_history: true

# ---
# 提示：
# 1. 敏感信息建议使用环境变量
# 2. 修改配置后重启 YM-CODE 生效
# 3. 使用 `ym-code config validate` 验证配置
# ---
